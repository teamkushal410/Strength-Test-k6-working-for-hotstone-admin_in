name: Load Test

on:
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          version: '1.6.1'

      - name: Run k6 load test
        run: |
          mkdir -p reports
          k6 run --out json=reports/report.json tests/hotstone-load.js

      - name: Generate HTML report
        run: |
          k6 html reports/report.json -o reports/report.html

      - name: Upload report
        uses: actions/upload-artifact@v3
        with:
          name: k6-report
          path: reports/report.html
