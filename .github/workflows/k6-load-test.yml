name: Hotstone Admin Load Test

on:
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: grafana/setup-k6-action@v1
        with:
          version: '0.46.0'

      - name: Run k6 load test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          RESTAURANT_ID: ${{ secrets.RESTAURANT_ID }}
        run: |
          mkdir -p reports
          k6 run --out json=reports/report.json tests/hotstone-load.js

      - name: Generate HTML report
        run: k6 report reports/report.json --out html=reports/report.html

      - name: Upload report
        uses: actions/upload-artifact@v3
        with:
          name: hotstone-load-report
          path: reports/report.html
