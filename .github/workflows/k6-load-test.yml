name: K6 Load Tests

on:
  workflow_dispatch:

jobs:
  k6-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Create results dir
        run: mkdir -p results

      - name: Run test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          RESTAURANT_ID: ${{ secrets.RESTAURANT_ID }}
        run: |
          k6 run --out json=results/result.json hotstone-load.js

      # ✅ Convert JSON → HTML
      - name: Generate HTML report
        run: |
          docker run --rm -v $PWD:/data \
          ghcr.io/grafana/k6-reporter:latest \
          /data/results/result.json > results/report.html

      # ✅ Upload HTML
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: k6-html-report
          path: results/report.html
