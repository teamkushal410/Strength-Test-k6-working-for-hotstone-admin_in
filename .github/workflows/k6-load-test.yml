name: Hotstone Load Tests

on:
  workflow_dispatch:
  push:
    branches: ['main']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  k6-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Create results dir
        run: mkdir -p results

      # 🔥 Run Load Test
      - name: Run Hotstone Load Test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          RESTAURANT_ID: ${{ secrets.RESTAURANT_ID }}
        run: |
          echo "Running k6 test..."
          k6 run --out json=results/hotstone-load.json tests/hotstone-load.js || true

      # 🧪 Debug: check files
      - name: List results folder
        run: |
          echo "Checking results..."
          ls -la results || true

      # 📦 Upload only if exists
      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: results/
          if-no-files-found: warn
