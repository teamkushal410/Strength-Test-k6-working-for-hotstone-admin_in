import http from 'k6/http';
import { check, sleep } from 'k6';
import { Rate } from 'k6/metrics';

// Custom metric to track failed requests
export let http_req_failed = new Rate('http_req_failed');

// Environment variables from GitHub secrets
const BASE_URL = __ENV.BASE_URL; // https://apiloyalty.hotstonelondon.com/api
const EMAIL = __ENV.EMAIL;       // admin@gmail.com
const PASSWORD = __ENV.PASSWORD; // Password@1
const RESTAURANT_ID = __ENV.RESTAURANT_ID; // your restaurant id

// Rate limit configuration: max 25 requests per minute (~1 request every 2.4s)
const REQUEST_INTERVAL = 2.4; // seconds

export function setup() {
    // Admin login
    const loginRes = http.post(`${BASE_URL}/auth/staff/login`, JSON.stringify({
        email: EMAIL,
        password: PASSWORD,
    }), {
        headers: { 'Content-Type': 'application/json' },
    });

    // Ensure login succeeded
    check(loginRes, {
        'login succeeded': (res) => res.status === 200 || res.status === 201,
    }) || (() => { throw new Error(`Login failed: ${loginRes.status} - ${loginRes.body}`) })();

    const authToken = loginRes.json('accessToken');
    return { authToken };
}

export default function (data) {
    // 1. Fetch customer special offers
    let resCustomer = http.get(`${BASE_URL}/special-offer/special-offer/customer`, {
        headers: {
            Authorization: `Bearer ${data.authToken}`,
            'x-restaurant-id': RESTAURANT_ID,
        },
    });
    check(resCustomer, {
        'customer offers success': (r) => r.status === 200,
    }) || http_req_failed.add(1);

    sleep(REQUEST_INTERVAL);

    // 2. Fetch all special offers
    let resOffers = http.get(`${BASE_URL}/special-offer`, {
        headers: {
            Authorization: `Bearer ${data.authToken}`,
        },
    });
    check(resOffers, {
        'admin offers success': (r) => r.status === 200,
    }) || http_req_failed.add(1);

    sleep(REQUEST_INTERVAL);
}

// Options for load and stress testing
export let options = {
    vus: 1, // start with 1 virtual user, scale as needed
    duration: '5m', // run for 5 minutes
    thresholds: {
        http_req_failed: ['rate<0.3'], // fail if >30% requests fail
        http_req_duration: ['p(95)<2000'], // 95% requests under 2s
    },
};
